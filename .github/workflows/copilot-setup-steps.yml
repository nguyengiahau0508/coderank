name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            coderank-api/package-lock.json
            coderank-client/package-lock.json
            coderank-agent/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install API dependencies
        working-directory: coderank-api
        run: npm ci --no-audit --no-fund

      - name: Install Client dependencies
        working-directory: coderank-client
        run: npm ci --no-audit --no-fund

      - name: Install Agent dependencies
        working-directory: coderank-agent
        run: npm ci --no-audit --no-fund

      - name: API build sanity check
        working-directory: coderank-api
        run: npm run build

      - name: Client build sanity check
        working-directory: coderank-client
        run: npm run build
