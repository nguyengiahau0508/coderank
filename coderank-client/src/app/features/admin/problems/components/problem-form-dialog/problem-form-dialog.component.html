<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
  <!-- Section: Basic Info -->
  <fieldset class="space-y-4">
    <legend class="text-sm font-semibold mb-2" style="color: var(--cr-text-primary);">Thông tin cơ bản</legend>

    <!-- Title -->
    <div class="flex flex-col gap-1.5">
      <label for="title" class="text-xs font-medium" style="color: var(--cr-text-muted);">
        Tiêu đề <span style="color: var(--cr-accent-red);">*</span>
      </label>
      <input
        pInputText
        id="title"
        formControlName="title"
        placeholder="Nhập tiêu đề bài tập"
        class="w-full"
        [class.ng-invalid]="form.get('title')?.invalid && form.get('title')?.touched"
      />
      @if (form.get('title')?.invalid && form.get('title')?.touched) {
        <small style="color: var(--cr-accent-red);" class="text-xs">{{ getFieldError('title') }}</small>
      }
    </div>

    <!-- Slug -->
    <div class="flex flex-col gap-1.5">
      <label for="slug" class="text-xs font-medium" style="color: var(--cr-text-muted);">
        Slug
        <span style="color: var(--cr-text-subtle);" class="font-normal">(tự tạo nếu để trống)</span>
      </label>
      <input
        pInputText
        id="slug"
        formControlName="slug"
        placeholder="bai-tap-vi-du"
        class="w-full"
        [class.ng-invalid]="form.get('slug')?.invalid && form.get('slug')?.touched"
      />
      @if (form.get('slug')?.invalid && form.get('slug')?.touched) {
        <small style="color: var(--cr-accent-red);" class="text-xs">{{ getFieldError('slug') }}</small>
      }
    </div>
  </fieldset>

  <!-- Section: Tags -->
  <fieldset class="space-y-4">
    <legend class="text-sm font-semibold mb-2" style="color: var(--cr-text-primary);">Tags</legend>

    <div class="flex flex-col gap-1.5">
      <label for="tags" class="text-xs font-medium" style="color: var(--cr-text-muted);">Chọn tags</label>
      <p-multiselect
        inputId="tags"
        [options]="tagOptions"
        [(ngModel)]="selectedTagIds"
        [ngModelOptions]="{ standalone: true }"
        optionLabel="label"
        optionValue="value"
        placeholder="Chọn tags cho bài tập"
        display="chip"
        [filter]="true"
        filterPlaceHolder="Tìm tag..."
        class="w-full"
      />
    </div>
  </fieldset>

  <!-- Section: Description -->
  <fieldset class="space-y-4">
    <legend class="text-sm font-semibold mb-2" style="color: var(--cr-text-primary);">Mô tả</legend>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-medium" style="color: var(--cr-text-muted);">Đề bài</label>
      <app-text-editor formControlName="description" />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium" style="color: var(--cr-text-muted);">Mô tả Input</label>
        <app-text-editor formControlName="inputDescription" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium" style="color: var(--cr-text-muted);">Mô tả Output</label>
        <app-text-editor formControlName="outputDescription" />
      </div>
    </div>
  </fieldset>

  <!-- Section: Constraints -->
  <fieldset class="space-y-4">
    <legend class="text-sm font-semibold mb-2" style="color: var(--cr-text-primary);">Giới hạn & Cấu hình</legend>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="flex flex-col gap-1.5">
        <label for="timeLimitMs" class="text-xs font-medium" style="color: var(--cr-text-muted);">
          Thời gian <span style="color: var(--cr-accent-red);">*</span>
        </label>
        <p-inputNumber
          inputId="timeLimitMs"
          formControlName="timeLimitMs"
          [min]="100"
          [max]="30000"
          [step]="100"
          suffix=" ms"
          [showButtons]="true"
          class="w-full"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="memoryLimitMb" class="text-xs font-medium" style="color: var(--cr-text-muted);">
          Bộ nhớ <span style="color: var(--cr-accent-red);">*</span>
        </label>
        <p-inputNumber
          inputId="memoryLimitMb"
          formControlName="memoryLimitMb"
          [min]="16"
          [max]="1024"
          [step]="16"
          suffix=" MB"
          [showButtons]="true"
          class="w-full"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="difficulty" class="text-xs font-medium" style="color: var(--cr-text-muted);">
          Độ khó <span style="color: var(--cr-accent-red);">*</span>
        </label>
        <p-select
          inputId="difficulty"
          formControlName="difficulty"
          [options]="difficultyOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Chọn"
          class="w-full"
        >
          <ng-template #item let-option>
            <span [class]="getDifficultyClass(option.value)">{{ option.label }}</span>
          </ng-template>
        </p-select>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="points" class="text-xs font-medium" style="color: var(--cr-text-muted);">
          Điểm <span style="color: var(--cr-accent-red);">*</span>
        </label>
        <p-inputNumber
          inputId="points"
          formControlName="points"
          [min]="0"
          [max]="1000"
          [step]="10"
          [showButtons]="true"
          class="w-full"
        />
      </div>
    </div>
  </fieldset>

  <!-- Published -->
  <div class="flex items-center gap-2 pt-2">
    <p-checkbox
      inputId="isPublished"
      formControlName="isPublished"
      [binary]="true"
    />
    <label for="isPublished" class="text-sm cursor-pointer" style="color: var(--cr-text-secondary);">
      Xuất bản bài tập (sinh viên có thể xem và làm bài)
    </label>
  </div>
</form>

<!-- Actions -->
<div class="flex justify-end gap-2 mt-4 pt-3" style="border-top: 1px solid var(--cr-border);">
  <p-button
    label="Hủy"
    severity="secondary"
    [outlined]="true"
    (onClick)="onCancel()"
    [disabled]="loading()"
  />
  <p-button
    [label]="isEditMode() ? 'Cập nhật' : 'Tạo mới'"
    icon="pi pi-check"
    (onClick)="onSubmit()"
    [loading]="loading()"
    [disabled]="form.invalid"
  />
</div>
