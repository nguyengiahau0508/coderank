<p-dialog
  [header]="dialogHeader"
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  (onHide)="onHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '720px' }"
  [breakpoints]="{ '768px': '95vw' }"
  [contentStyle]="{ 'max-height': 'calc(90vh - 120px)', 'overflow-y': 'auto' }"
  appendTo="body"
>
  <div class="space-y-5">
    <!-- Title -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-medium" style="color: var(--cr-text-muted);">
        Tiêu đề <span style="color: var(--cr-accent-red);">*</span>
      </label>
      <input
        pInputText
        type="text"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        placeholder="VD: Dynamic Programming O(n) solution"
        class="w-full"
      />
    </div>

    <!-- Language -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-medium" style="color: var(--cr-text-muted);">
        Ngôn ngữ
      </label>
      <p-select
        [ngModel]="language()"
        (ngModelChange)="language.set($event)"
        [options]="languageOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Chọn ngôn ngữ"
        class="w-full"
      />
    </div>

    <!-- Description (Rich text editor) -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-medium" style="color: var(--cr-text-muted);">
        Giải thích cách giải <span style="color: var(--cr-accent-red);">*</span>
      </label>
      <p-editor
        [ngModel]="description()"
        (onTextChange)="onDescriptionChange($event)"
        [style]="{ height: '200px' }"
        placeholder="Mô tả ý tưởng, thuật toán và cách tiếp cận của bạn..."
      >
        <ng-template #header>
          <span class="ql-formats">
            <select class="ql-header" aria-label="Heading">
              <option value="2">Heading</option>
              <option value="3">Subheading</option>
              <option selected>Normal</option>
            </select>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-bold" aria-label="Bold"></button>
            <button type="button" class="ql-italic" aria-label="Italic"></button>
            <button type="button" class="ql-underline" aria-label="Underline"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-list" value="ordered" aria-label="Ordered list"></button>
            <button type="button" class="ql-list" value="bullet" aria-label="Bullet list"></button>
            <button type="button" class="ql-code-block" aria-label="Code block"></button>
          </span>
          <span class="ql-formats">
            <button type="button" class="ql-link" aria-label="Link"></button>
            <button type="button" class="ql-clean" aria-label="Clean"></button>
          </span>
        </ng-template>
      </p-editor>
    </div>

    <!-- Code -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-medium" style="color: var(--cr-text-muted);">
        Source code <span style="color: var(--cr-accent-red);">*</span>
      </label>
      <textarea
        [ngModel]="code()"
        (ngModelChange)="code.set($event)"
        placeholder="Dán code solution của bạn ở đây..."
        rows="10"
        class="w-full px-3 py-2.5 text-xs rounded-lg resize-none font-mono focus:outline-none transition-colors"
        style="background: var(--cr-bg-tertiary); color: var(--cr-text-primary); border: 1px solid var(--cr-border);"
      ></textarea>
    </div>
  </div>

  <ng-template #footer>
    <div class="flex items-center justify-end gap-2">
      <p-button
        label="Hủy"
        severity="secondary"
        [outlined]="true"
        (onClick)="onHide()"
        [disabled]="isSubmitting()"
      />
      <p-button
        [label]="isEditMode ? 'Cập nhật' : 'Chia sẻ'"
        [icon]="isEditMode ? 'pi pi-check' : 'pi pi-share-alt'"
        (onClick)="submit()"
        [loading]="isSubmitting()"
      />
    </div>
  </ng-template>
</p-dialog>
