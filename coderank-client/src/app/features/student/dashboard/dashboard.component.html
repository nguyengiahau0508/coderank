<div class="space-y-5">
  @if (loading()) {
    <div class="space-y-4">
      <div class="rounded-2xl p-5" style="background: var(--cr-bg-secondary); border: 1px solid var(--cr-border);">
        <p-skeleton height="2.25rem" width="40%" styleClass="mb-3" />
        <p-skeleton height="1rem" width="60%" styleClass="mb-5" />
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
          @for (_ of [1, 2, 3, 4]; track $index) {
            <p-skeleton height="5rem" />
          }
        </div>
      </div>
      <div class="grid grid-cols-1 xl:grid-cols-[minmax(0,1.3fr)_minmax(0,0.7fr)] gap-4">
        <p-skeleton height="24rem" />
        <p-skeleton height="24rem" />
      </div>
    </div>
  } @else if (errorMessage() && !profile()) {
    <section class="rounded-xl p-5 text-center" style="background: var(--cr-bg-secondary); border: 1px solid var(--cr-border);">
      <i class="pi pi-exclamation-triangle text-2xl" style="color: var(--cr-accent-yellow);"></i>
      <p class="text-sm mt-2" style="color: var(--cr-text-muted);">{{ errorMessage() }}</p>
      <p-button label="Tải lại" icon="pi pi-refresh" styleClass="mt-3" (click)="reload()" />
    </section>
  } @else {
    <app-dashboard-hero-card
      [profile]="profile()"
      [learning]="learning()"
      [contests]="contests()"
    />

    @if (partialFailures().length > 0) {
      <section class="rounded-xl p-3" style="background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.35);">
        <p class="text-xs font-medium" style="color: var(--cr-accent-yellow);">
          Một số widget chưa tải đủ dữ liệu ({{ partialFailures().join(', ') }}). Bạn vẫn có thể sử dụng các phần còn lại.
        </p>
      </section>
    }

    <div class="grid grid-cols-1 xl:grid-cols-[minmax(0,1.3fr)_minmax(0,0.7fr)] gap-4 items-start">
      <div class="space-y-4">
        <app-dashboard-learning-widget
          [courses]="learning()?.recentCourses || []"
        />

        <app-dashboard-contest-widget
          [recentParticipations]="contests()?.recentParticipations || []"
          [spotlightContests]="contests()?.spotlightContests || []"
        />
      </div>

      <aside class="space-y-4 xl:sticky xl:top-4">
        <app-dashboard-recommendations-widget
          [problems]="recommendations()?.problems || []"
          [activeLearningPath]="recommendations()?.activeLearningPath || null"
        />

        <app-dashboard-quick-actions-widget
          [actions]="recommendations()?.quickActions || []"
        />
      </aside>
    </div>
  }
</div>
