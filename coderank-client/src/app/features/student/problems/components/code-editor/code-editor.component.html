<div class="h-full flex flex-col">
  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-2 border-b border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-900">
    <p-select
      [(ngModel)]="selectedLanguage"
      [options]="languageOptions"
      optionLabel="label"
      optionValue="value"
      (onChange)="onLanguageChange()"
      [disabled]="readOnly()"
      styleClass="w-36"
    />

    @if (!readOnly()) {
      <button
        type="button"
        (click)="clearEditor()"
        class="text-xs text-surface-400 hover:text-surface-700 dark:hover:text-surface-200 transition-colors"
      >
        <i class="pi pi-refresh text-xs mr-1"></i>
        Đặt lại
      </button>
    }
  </div>

  <!-- Editor -->
  <div class="flex-1 min-h-[400px]">
    <ngx-monaco-editor
      [options]="editorOptions"
      [model]="editorModel"
      [(ngModel)]="codeValue"
      (ngModelChange)="onCodeChange($event)"
      class="h-full w-full"
    />
  </div>
</div>
