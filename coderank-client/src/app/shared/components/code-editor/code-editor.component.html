<!-- Code Editor -->
<div class="flex h-full flex-col overflow-hidden">
  <!-- Header -->
  <div class="flex shrink-0 items-center justify-between border-b px-3 py-2" style="background: var(--cr-bg-tertiary); border-color: var(--cr-border);">
    <p-select
      [(ngModel)]="selectedLanguage"
      [options]="languageOptions"
      optionLabel="label"
      optionValue="value"
      (onChange)="onLanguageChange()"
      [disabled]="readOnly()"
      styleClass="w-36"
      size="small"
    />

    @if (!readOnly()) {
      <button
        type="button"
        (click)="clearEditor()"
        class="text-[11px] transition-colors hover:text-blue-400"
        style="color: var(--cr-text-muted);"
      >
        <i class="pi pi-refresh mr-1 text-[10px]"></i>
        Reset
      </button>
    }
  </div>

  <!-- Editor -->
  <div class="flex-1">
    <ngx-monaco-editor
      [options]="editorOptions"
      [model]="editorModel"
      [(ngModel)]="codeValue"
      (ngModelChange)="onCodeChange($event)"
      [style]="{ height: '100%' }"
    />
  </div>
</div>
