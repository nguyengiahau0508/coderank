<!-- Code Editor -->
<div class="flex flex-col border border-surface-200 dark:border-surface-700 rounded-xl overflow-hidden">
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-2.5 bg-surface-50 dark:bg-surface-900 border-b border-surface-200 dark:border-surface-700">
    <p-select
      [(ngModel)]="selectedLanguage"
      [options]="languageOptions"
      optionLabel="label"
      optionValue="value"
      (onChange)="onLanguageChange()"
      [disabled]="readOnly()"
      styleClass="w-36"
      size="small"
    />

    @if (!readOnly()) {
      <button
        type="button"
        (click)="clearEditor()"
        class="text-xs text-surface-400 hover:text-surface-700 dark:hover:text-surface-200 transition-colors"
      >
        <i class="pi pi-refresh mr-1 text-[10px]"></i>
        Đặt lại
      </button>
    }
  </div>

  <!-- Editor -->
  <div class="min-h-[460px]">
    <ngx-monaco-editor
      [options]="editorOptions"
      [model]="editorModel"
      [(ngModel)]="codeValue"
      (ngModelChange)="onCodeChange($event)"
      class="h-full w-full"
    />
  </div>
</div>
